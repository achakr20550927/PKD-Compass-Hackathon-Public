name: PKDCompassNative
options:
  bundleIdPrefix: com.pkdcompass
  deploymentTarget:
    iOS: '17.0'
configs:
  Debug: debug
  Release: release
settings:
  base:
    SWIFT_VERSION: 5.10
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 1.0.0
targets:
  PKDCompassNative:
    type: application
    platform: iOS
    sources:
      - path: App
      - path: Views
      - path: ViewModels
      - path: Models
      - path: Services
      - path: Networking
      - path: Persistence
      - path: Utilities
      - path: Resources
    info:
      path: Resources/Info.plist
      properties:
        CFBundleDisplayName: PKD Compass
        UILaunchScreen: {}
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
        NSPhotoLibraryUsageDescription: PKD Compass uses your photo library to attach medical documents.
        NSCameraUsageDescription: PKD Compass uses your camera to scan medical documents.
        NSUserNotificationsUsageDescription: PKD Compass uses notifications for medication and appointment reminders.
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pkdcompass.native
        INFOPLIST_FILE: Resources/Info.plist
        TARGETED_DEVICE_FAMILY: '1,2'
        CODE_SIGN_STYLE: Automatic
